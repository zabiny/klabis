openapi: 3.0.3
info:
  title: Klabis Dashboard API
  description: |
    Proposed API endpoints for dashboard data.
    These endpoints provide aggregated statistics and personalized views
    for the frontend dashboard.
  version: 0.1.0-proposal

paths:
  /api/dashboard/stats:
    get:
      summary: Get dashboard statistics (admin)
      description: |
        Returns aggregated statistics for the admin dashboard.
        Requires authentication. Available data depends on user permissions.
      operationId: getDashboardStats
      tags:
        - Dashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
        '401':
          description: Unauthorized

  /api/dashboard/upcoming-events:
    get:
      summary: Get upcoming events
      description: |
        Returns the next N events sorted by date.
        For admin users, returns all upcoming events.
        For regular users, could be filtered to relevant events.
      operationId: getUpcomingEvents
      tags:
        - Dashboard
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
          description: Maximum number of events to return
      responses:
        '200':
          description: List of upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UpcomingEvent'
        '401':
          description: Unauthorized

  /api/dashboard/my-events:
    get:
      summary: Get my upcoming registered events
      description: |
        Returns events where the authenticated user is registered.
        Only returns future events. Requires the user to have a linked member profile.
      operationId: getMyEvents
      tags:
        - Dashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user's registered events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MyEvent'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DashboardStats:
      type: object
      properties:
        activeMembersCount:
          type: integer
          description: Number of active members
          example: 42
        upcomingEventsCount:
          type: integer
          description: Number of upcoming events (ACTIVE status, future date)
          example: 3
        totalGroupsCount:
          type: integer
          description: Number of groups/teams
          example: 5
      required:
        - activeMembersCount
        - upcomingEventsCount
        - totalGroupsCount

    UpcomingEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Jarni zavod
        eventDate:
          type: string
          format: date
          example: '2026-04-15'
        location:
          type: string
          example: Praha
        organizer:
          type: string
          example: ZBM
      required:
        - id
        - name
        - eventDate
        - location
        - organizer

    MyEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Jarni zavod
        eventDate:
          type: string
          format: date
          example: '2026-04-15'
        location:
          type: string
          example: Praha
        registeredAt:
          type: string
          format: date-time
          example: '2026-03-20T10:30:00Z'
      required:
        - id
        - name
        - eventDate
        - location
        - registeredAt
