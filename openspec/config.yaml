# OpenSpec Project Configuration
# This configuration provides context for AI-assisted specification work

context: |
  Klabis is a backend API for orienteering club management (members, events, finances).

  **Architecture:** Backend and frontend, KISS
  **Backend**: Spring framework, Clean Architecture + DDD, dependency rule inward, KISS
  **Frontend**: React, OIDC, custom HAL+FORMS framework, conditional based on HAL+FORMS metadata from API
  **API Design:** REST with HATEOAS (mandatory), HAL+FORMS media type, hypermedia navigation  
  **Testing:** Red-Green-Refactor TDD required (write tests, implement with minimal version, refactor), JUnit 5 + AssertJ + Mockito, >80% coverage

  **Key Constraints:**
  - specify functionality from user's perspective
  - All API responses must include `_links` (HATEOAS compliance)
  - GDPR compliance required
  - Target: 10+ concurrent users, <500ms API response

  Organize specs by bounded context

rules:
  specs:
    - "write files strictly using English"
    - "create specs for both backend and frontend"
    - "Write scenarios from user's point of view whe using application frontend - describe user who is performing action, what he does in the application and what is expected result. Focus on business requirements (WHAT), not implementation (HOW)"
    - "Avoid implementation related requirements and scenario descriptions (keep it purely business specs)"
    - "Security requirements OK: use \"cryptographically hashed\" not \"BCrypt\""
    - "every application module shall have single specs.md file"

  tasks:
    - "split large feature into smaller feature incrememts/iterations (vertical slices). Application should be functional after every iteration."
    - "Follow Red-Green-Refactor TDD: write failing test, implement, refactor"
    - "Aim for >80% tests coverage coverage, 100% for domain logic"
    - "If tasks are created from github issue, add task to add label 'BackendCompleted' to that issue"

  design:
    - "Use Mermaid diagrams in design.md to visualize concepts if applicable"
    - "Use ubiquitous language (UserId, EmailAddress) not Java patterns (record, factory method)"

  proposal:
    - "Use Mermaid diagrams in proposal.md to visualize concepts if applicable"

