<VirtualHost *:80>
    ServerName mailpit.dpolach.com
    Redirect permanent / https://mailpit.dpolach.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName mailpit.dpolach.com

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/mailpit.dpolach.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/mailpit.dpolach.com/privkey.pem

    ProxyPreserveHost On
    ProxyPass        / http://localhost:8025/
    ProxyPassReverse / http://localhost:8025/

    # WebSocket pro live updates
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://localhost:8025/$1 [P,L]
</VirtualHost>
