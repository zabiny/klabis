<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - Klabis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --navy: #0A1628;
            --navy-light: #1A2B45;
            --cyan: #00D9FF;
            --cyan-dark: #00A8CC;
            --cream: #FAF8F5;
            --cream-dark: #F0EDE8;
            --gray: #6B7280;
            --gray-light: #E5E7EB;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--cream);
            color: var(--navy);
            line-height: 1.6;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background: var(--navy);
            color: var(--white);
            padding: 40px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            padding: 0 30px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo .subtitle {
            font-size: 13px;
            color: var(--cyan);
            font-weight: 400;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .nav-section {
            margin-bottom: 35px;
        }

        .nav-title {
            padding: 0 30px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 30px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
            font-size: 15px;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
        }

        .nav-link.active {
            background: rgba(0, 217, 255, 0.1);
            color: var(--cyan);
            font-weight: 500;
        }

        .nav-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--cyan);
        }

        .nav-link .icon {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            margin-right: 14px;
            opacity: 0.4;
        }

        .nav-link.active .icon {
            opacity: 1;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 60px 80px;
            max-width: 1400px;
        }

        .breadcrumb {
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 24px;
        }

        .breadcrumb a {
            color: var(--cyan-dark);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .hero {
            margin-bottom: 60px;
        }

        .hero h2 {
            font-size: 42px;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .hero .lead {
            font-size: 18px;
            color: var(--gray);
            font-weight: 300;
            max-width: 700px;
            line-height: 1.6;
        }

        .section-title {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cyan-dark);
            margin-bottom: 24px;
            margin-top: 50px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        /* Feature Grid */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature-item {
            background: var(--white);
            border: 1px solid var(--gray-light);
            padding: 24px;
            border-radius: 2px;
        }

        .feature-item h4 {
            font-size: 16px;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .feature-item p {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.5;
        }

        /* Highlight Box */
        .highlight-box {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, rgba(0, 168, 204, 0.05) 100%);
            border-left: 3px solid var(--cyan);
            padding: 24px;
            margin: 30px 0;
        }

        .highlight-box h4 {
            color: var(--navy);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .highlight-box p {
            color: var(--gray);
            font-size: 14px;
        }

        /* Event Flow / Token Flow */
        .event-flow, .token-flow {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 30px 0;
            padding: 24px;
            background: var(--white);
            border: 1px solid var(--gray-light);
            border-radius: 2px;
            flex-wrap: wrap;
        }

        .event-step, .token-step {
            flex: 1;
            min-width: 150px;
            text-align: center;
        }

        .event-step-number, .token-step-number {
            width: 32px;
            height: 32px;
            background: var(--cyan);
            color: var(--navy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin: 0 auto 12px;
        }

        .event-step-title, .token-step-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 4px;
        }

        .event-step-desc, .token-step-desc {
            font-size: 12px;
            color: var(--gray);
        }

        .event-arrow, .token-arrow {
            font-size: 24px;
            color: var(--cyan);
        }

        /* API Section */
        .api-section {
            background: var(--navy-light);
            padding: 32px;
            border-radius: 2px;
            margin-top: 40px;
        }

        .api-section h3 {
            color: var(--white);
            font-size: 18px;
            margin-bottom: 20px;
        }

        .api-endpoint {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .api-endpoint:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .method {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 2px;
            min-width: 70px;
            text-align: center;
        }

        .method.get {
            background: #22c55e;
            color: white;
        }

        .method.post {
            background: #3b82f6;
            color: white;
        }

        .method.put {
            background: #8b5cf6;
            color: white;
        }

        .method.patch {
            background: #f59e0b;
            color: white;
        }

        .method.delete {
            background: #ef4444;
            color: white;
        }

        .endpoint {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--cyan);
            flex: 1;
        }

        .description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }

        /* Diagram Box (Event Architecture) */
        .diagram-box {
            background: var(--navy-light);
            padding: 32px;
            border-radius: 2px;
            margin: 30px 0;
        }

        .diagram-box h3 {
            color: var(--white);
            font-size: 18px;
            margin-bottom: 20px;
        }

        .diagram-flow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .diagram-node {
            background: var(--white);
            padding: 16px 24px;
            border-radius: 4px;
            text-align: center;
            min-width: 140px;
        }

        .diagram-node.primary {
            background: var(--cyan);
            color: var(--navy);
            font-weight: 600;
        }

        .diagram-arrow {
            font-size: 28px;
            color: var(--cyan);
        }

        /* Cards Grid (Index page) */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }

        .card {
            background: var(--white);
            border: 1px solid var(--gray-light);
            padding: 32px;
            border-radius: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--cyan);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(10, 22, 40, 0.08);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--cyan-dark) 100%);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 20px;
            font-weight: 500;
            color: var(--white);
        }

        .card h3 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--navy);
        }

        .card p {
            color: var(--gray);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            color: var(--cyan-dark);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .card-link:hover {
            color: var(--cyan);
            transform: translateX(4px);
        }

        .card-link::after {
            content: '→';
            margin-left: 8px;
            font-size: 16px;
        }

        /* Stats (Index page) */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 60px;
            padding: 40px;
            background: var(--navy);
            border-radius: 2px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 42px;
            font-weight: 600;
            color: var(--cyan);
            margin-bottom: 8px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }

            .main-content {
                margin-left: 0;
                padding: 40px 24px;
            }

            .hero h2 {
                font-size: 32px;
            }

            .feature-grid, .cards-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
                gap: 32px;
            }

            .event-flow, .token-flow, .diagram-flow {
                flex-direction: column;
            }

            .event-arrow, .token-arrow, .diagram-arrow {
                transform: rotate(90deg);
            }
        }
    </style>
</head>
