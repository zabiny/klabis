spring:
  application:
    name: klabis-backend

  profiles:
    active: dev

  mvc:
    problemdetails:
      enabled: true

  modulith:
    detection-strategy: explicitly-annotated
    events:
      enabled: true
      completion-mode: UPDATE
      republish-outstanding-events-on-restart: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    port: ${KLABIS_SMTP_PORT:587}
    username: ${KLABIS_SMTP_USERNAME:}
    password: ${KLABIS_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  security:
    oauth2:
      authorizationserver:
        issuer: ${KLABIS_OAUTH2_ISSUER:https://localhost:8443}

  cache:
    type: simple
    cache-names: rateLimitCache

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith,prometheus,metrics
      base-path: /actuator
  endpoint:
    modulith:
      access: read_only
    health:
      access: unrestricted
    info:
      access: read_only

resilience4j:
  ratelimiter:
    configs:
      default:
        limit-for-period: 10
        limit-refresh-period: 1m
        timeout-duration: 5s
    instances:
      password-reset:
        base-config: default
        limit-for-period: 3
        limit-refresh-period: 1h
        timeout-duration: 0s
      password-setup-token-request:
        base-config: default
        limit-for-period: 3
        limit-refresh-period: 1h
        timeout-duration: 0s

springdoc:
  swagger-ui:
    oauth:
      client-id: apispec
      client-secret: apispec
      scopes: openid,profile
  show-actuator: true
  api-docs:
    groups:
      enabled: true
    enabled: true
  group-configs:
    - group: members
      display-name: Members API
      packages-to-scan:
        - com.klabis.members
        - com.klabis.users
    - group: events
      display-name: Events API
      packages-to-scan:
        - com.klabis.events
    - group: finance
      display-name: Finances API
      packages-to-scan:
        - com.klabis.finance
    - group: all
      display-name: X All endpoints
      paths-to-match:
        - /**
      paths-to-exclude:
        - /actuator/**
    - group: actuator
      display-name: System monitoring endpoints
      paths-to-match:
        - /actuator/**

klabis:
  club:
    code: ${KLABIS_CLUB_CODE:ZBM}
    name: ${KLABIS_CLUB_NAME:Klub orientačního běhu}

  email:
    enabled: ${KLABIS_EMAIL_ENABLED:false}
    from: ${KLABIS_EMAIL_FROM:noreply@klabis.cz}

  events:
    logging:
      enabled: ${KLABIS_EVENT_LOGGING_ENABLED:true}

  frontend:
    allowed-origins: ${KLABIS_FRONTEND_ALLOWED_ORIGINS:http://localhost:3000,https://localhost:8443}
    allow-credentials: ${KLABIS_FRONTEND_ALLOW_CREDENTIALS:true}

  bootstrap:
    admin:
      username: ${KLABIS_ADMIN_USERNAME:admin}
      password: ${KLABIS_ADMIN_PASSWORD:}

  oauth2:
    client:
      id: ${KLABIS_OAUTH2_CLIENT_ID:klabis-web}
      secret: ${KLABIS_OAUTH2_CLIENT_SECRET:}
      uuid: ${KLABIS_OAUTH2_CLIENT_UUID:}
      redirect-uris: ${KLABIS_OAUTH2_CLIENT_REDIRECT_URIS:http://localhost:3000/auth/callback,https://localhost:8443/mock/auth/callback.html,https://localhost:8443/auth/callback}
      post-logout-redirect-uris: ${KLABIS_OAUTH2_POST_LOGOUT_REDIRECT_URIS:http://localhost:3000,https://localhost:8443}
      scopes: ${KLABIS_OAUTH2_CLIENT_SCOPES:}

  password-setup:
    base-url: ${KLABIS_BASE_URL:https://localhost:8443}
    token:
      expiration-hours: ${KLABIS_PASSWORD_SETUP_TOKEN_EXPIRATION_HOURS:4}
      hash-algorithm: SHA-256
    rate-limit:
      requests: 3
      duration-seconds: 3600

jasypt:
  encryptor:
    password: ${KLABIS_JASYPT_PASSWORD}
    algorithm: PBEWithHmacSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

server:
  port: 8443
  ssl:
    enabled: true
    key-store: ${KLABIS_SSL_KEYSTORE_PATH:classpath:https/keystore.p12}
    key-store-password: ${KLABIS_SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: PKCS12
    key-alias: ${KLABIS_SSL_KEY_ALIAS:localhost}
  http2:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always

info:
  app:
    name: Klabis Backend API
    description: Klabis Membership Management System
    version: 0.1.0-SNAPSHOT

logging:
  level:
    com.klabis: DEBUG
    org.springframework.web: INFO
    org.springframework.modulith.events: ${KLABIS_EVENT_LOGGING_LEVEL:DEBUG}


---
# Development profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:klabis;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  devtools:
    livereload:
      enabled: false

logging:
  level:
    org.springframework.security: DEBUG

---
# Test profile
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 10000

  flyway:
    clean-disabled: false

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod

  h2:
    console:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/klabis
    username: ${KLABIS_DB_USERNAME:klabis}
    password: ${KLABIS_DB_PASSWORD:klabis}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${KLABIS_DB_POOL_MAX_SIZE:20}
      minimum-idle: ${KLABIS_DB_POOL_MIN_IDLE:10}
      connection-timeout: ${KLABIS_DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${KLABIS_DB_IDLE_TIMEOUT:300000}
      max-lifetime: ${KLABIS_DB_MAX_LIFETIME:1800000}

  mail:
    host: ${KLABIS_SMTP_HOST}

klabis:
  frontend:
    allowed-origins: ${KLABIS_FRONTEND_ALLOWED_ORIGINS:https://your-frontend-domain.com}

logging:
  level:
    com.klabis: INFO
    org.springframework.security: WARN
