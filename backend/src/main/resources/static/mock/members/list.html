<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Členové - Klabis</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="8" fill="#4F46E5"/>
                    <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
                <h1>Klabis</h1>
            </div>
            <p class="sidebar-subtitle">Systém správy členů</p>
        </div>

        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
                </svg>
                <span>Přehled</span>
            </a>
            <a href="list.html" class="nav-item active">
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/>
                </svg>
                <span>Členové</span>
            </a>
            <a href="form.html" class="nav-item">
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"/>
                </svg>
                <span>Nový člen</span>
            </a>
            <a href="../user-permissions/permissions.html" class="nav-item">
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/>
                </svg>
                <span>Oprávnění</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">A</div>
                <div class="user-details">
                    <span class="user-name">Administrátor</span>
                    <span class="user-reg-number">admin</span>
                </div>
            </div>
            <button onclick="handleLogout()" class="btn-logout">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path fill-rule="evenodd"
                          d="M10 12.5a.5.5 0 01-.5.5h-8a.5.5 0 01-.5-.5v-9a.5.5 0 01.5-.5h8a.5.5 0 01.5.5v2a.5.5 0 001 0v-2A1.5 1.5 0 009.5 2h-8A1.5 1.5 0 000 3.5v9A1.5 1.5 0 001.5 14h8a1.5 1.5 0 001.5-1.5v-2a.5.5 0 00-1 0v2z"/>
                    <path fill-rule="evenodd"
                          d="M15.854 8.354a.5.5 0 000-.708l-3-3a.5.5 0 00-.708.708L14.293 7.5H5.5a.5.5 0 000 1h8.793l-2.147 2.146a.5.5 0 00.708.708l3-3z"/>
                </svg>
                Odhlásit
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="content-header">
            <h2>Správa členů</h2>
            <p>Procházejte a spravujte členy klubu</p>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h3 class="table-title">Seznam členů</h3>
                <div class="table-actions">
                    <div class="search-box">
                        <svg viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                  d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
                        </svg>
                        <input type="text" id="searchInput" class="form-input" placeholder="Hledat člena..."
                               oninput="handleSearch(this.value)">
                    </div>
                    <a href="form.html" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"/>
                        </svg>
                        Přidat člena
                    </a>
                </div>
            </div>

            <table>
                <thead>
                <tr>
                    <th class="sortable" onclick="handleSort('registrationNumber')">
                        Reg. číslo
                        <span id="sort-registrationNumber" class="sort-indicator"></span>
                    </th>
                    <th class="sortable" onclick="handleSort('lastName')">
                        Příjmení
                        <span id="sort-lastName" class="sort-indicator"></span>
                    </th>
                    <th class="sortable" onclick="handleSort('firstName')">
                        Jméno
                        <span id="sort-firstName" class="sort-indicator"></span>
                    </th>
                    <th>Datum narození</th>
                    <th>Stav</th>
                    <th>Akce</th>
                </tr>
                </thead>
                <tbody id="membersTableBody"></tbody>
            </table>

            <div class="pagination">
                <div class="pagination-info" id="paginationInfo"></div>
                <div class="pagination-nav" id="paginationNav"></div>
            </div>
        </div>
    </main>
</div>

<script src="../api-client.js"></script>
<script src="../app.js"></script>
<script>
    let membersData = null;
    let currentPage = 0;
    const pageSize = 10;
    let sortField = 'lastName';
    let sortDirection = 'asc';
    let searchQuery = '';

    document.addEventListener('DOMContentLoaded', async () => {
        await loadMembers();
    });

    async function loadMembers() {
        showLoading();

        try {
            const sortParam = `${sortField},${sortDirection}`;
            const response = await apiClient.getMembers({
                page: currentPage,
                size: pageSize,
                sort: sortParam
            });

            membersData = response;
            renderMembers();
            renderPagination();
            updateSortIndicators();
        } catch (error) {
            handleApiError(error);
        }
    }

    function showLoading() {
        const tbody = document.getElementById('membersTableBody');
        tbody.innerHTML = `
                <tr>
                    <td colspan="6" style="text-align: center; padding: 2rem;">
                        <div style="display: inline-block; width: 30px; height: 30px; border: 3px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                        <p style="margin-top: 1rem; color: var(--gray-500);">Načítání členů...</p>
                    </td>
                </tr>
            `;
    }

    function renderMembers() {
        if (!membersData || !membersData._embedded) {
            const tbody = document.getElementById('membersTableBody');
            tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 2rem;">
                            <p style="color: var(--gray-500);">Žádní členové nebyli nalezeni.</p>
                        </td>
                    </tr>
                `;
            updatePaginationInfo(0, 0, 0);
            return;
        }

        const tbody = document.getElementById('membersTableBody');
        const members = membersData._embedded.memberSummaryResponseList || [];

        tbody.innerHTML = members.map(member => `
                <tr>
                    <td><strong>${member.registrationNumber || '-'}</strong></td>
                    <td>${member.lastName || ''}</td>
                    <td>${member.firstName || ''}</td>
                    <td>${member.dateOfBirth ? formatDate(member.dateOfBirth) : '-'}</td>
                    <td>
                        <span class="status-badge ${member.active ? 'status-active' : 'status-inactive'}">
                            ${member.active ? 'Aktivní' : 'Neaktivní'}
                        </span>
                    </td>
                    <td>
                        <a href="details.html?id=${member.id}" class="btn-link">Zobrazit</a>
                    </td>
                </tr>
            `).join('');

        const page = membersData.page || {};
        updatePaginationInfo(
            page.number || 0,
            page.totalPages || 0,
            page.totalElements || 0
        );
    }

    function renderPagination() {
        if (!membersData) return;

        const nav = document.getElementById('paginationNav');
        const page = membersData.page || {totalPages: 1, number: 0};
        const totalPages = page.totalPages || 1;

        let buttons = '';

        buttons += `<button class="pagination-btn" ${currentPage === 0 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">← Předchozí</button>`;

        for (let i = 0; i < totalPages; i++) {
            if (i === 0 || i === totalPages - 1 || (i >= currentPage - 1 && i <= currentPage + 1)) {
                buttons += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i + 1}</button>`;
            } else if (i === currentPage - 2 || i === currentPage + 2) {
                buttons += '<span style="padding: 0.375rem 0.5rem; color: var(--gray-400);">...</span>';
            }
        }

        buttons += `<button class="pagination-btn" ${currentPage >= totalPages - 1 ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">Další →</button>`;
        nav.innerHTML = buttons;
    }

    function goToPage(page) {
        if (!membersData) return;
        const totalPages = membersData.page?.totalPages || 1;
        if (page < 0 || page >= totalPages) return;
        currentPage = page;
        loadMembers();
    }

    function updatePaginationInfo(currentPage, totalPages, totalElements) {
        const info = document.getElementById('paginationInfo');
        if (totalElements === 0) {
            info.textContent = 'Žádní členové';
            return;
        }
        const start = currentPage * pageSize + 1;
        const end = Math.min((currentPage + 1) * pageSize, totalElements);
        info.textContent = `Zobrazeno ${start}-${end} z ${totalElements} členů`;
    }

    function handleSort(field) {
        if (sortField === field) {
            sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
            sortField = field;
            sortDirection = 'asc';
        }
        currentPage = 0;
        loadMembers();
    }

    function updateSortIndicators() {
        document.querySelectorAll('.sort-indicator').forEach(el => el.textContent = '');
        const indicator = document.getElementById(`sort-${sortField}`);
        if (indicator) indicator.textContent = sortDirection === 'asc' ? ' ▲' : ' ▼';
    }

    const debouncedSearch = debounce((query) => {
        searchQuery = query;
        currentPage = 0;
        // Note: Backend doesn't support search, this would be client-side filtering
        // For now, just reload members
        loadMembers();
    }, 500);

    function handleSearch(query) {
        debouncedSearch(query);
    }

    function handleLogout() {
        if (confirm('Opravdu se chcete odhlásit?')) {
            sessionStorage.removeItem('isAuthenticated');
            apiClient.clearToken();
            window.location.href = '../auth/login.html';
        }
    }
</script>
<style>
    @keyframes spin {
        from {
            transform: rotate(0deg);
        }
        to {
            transform: rotate(360deg);
        }
    }
</style>
</body>
</html>
