<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrace na akci - Klabis</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">

                    <rect width="40" height="40" rx="8" fill="#4F46E5"/>
                    <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
                <h1>Klabis</h1>
            </div>
            <p class="sidebar-subtitle">Systém správy členů</p>
        </div>

        <nav class="sidebar-nav">
            <a href="../index.html" class="nav-item">
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
                </svg>
                <span>Přehled</span>
            </a>
            <a href="../members/list.html" class="nav-item">
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/>
                </svg>
                <span>Členové</span>
            </a>
            <a href="list.html" class="nav-item active">
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M6 2a1 1 0 00-1 1v2H4a2 2 0 00-2 2v2h16V7a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v2H7V3a1 1 0 00-1-1zm0 5H4v9a2 2 0 002 2h12a2 2 0 002-2V7h-2v2a1 1 0 11-2 0V7H8v2a1 1 0 11-2 0V7z"/>
                </svg>
                <span>Akce</span>
            </a>
            <a href="../user-permissions/permissions.html" class="nav-item">
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/>
                </svg>
                <span>Oprávnění</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">A</div>
                <div class="user-details">
                    <span class="user-name">Administrátor</span>
                    <span class="user-reg-number">admin</span>
                </div>
            </div>
            <button onclick="handleLogout()" class="btn-logout">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path fill-rule="evenodd"
                          d="M10 12.5a.5.5 0 01-.5.5h-8a.5.5 0 01-.5-.5v-9a.5.5 0 01.5-.5h8a.5.5 0 01.5.5v2a.5.5 0 001 0v-2A1.5 1.5 0 009.5 2h-8A1.5 1.5 0 000 3.5v9A1.5 1.5 0 001.5 14h8a1.5 1.5 0 001.5-1.5v-2a.5.5 0 00-1 0v2z"/>
                    <path fill-rule="evenodd"
                          d="M15.854 8.354a.5.5 0 000-.708l-3-3a.5.5 0 00-.708.708L14.293 7.5H5.5a.5.5 0 000 1h8.793l-2.147 2.146a.5.5 0 00.708.708l3-3z"/>
                </svg>
                Odhlásit
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div id="loadingState" style="text-align: center; padding: 3rem;">
            <div style="display: inline-block; width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 1rem; color: var(--gray-500);">Načítání akce...</p>
        </div>

        <div id="formContent" style="display: none;">
            <div class="content-header">
                <h2>Registrace na akci</h2>
                <p id="eventSubtitle">Registrace na vybranou akci</p>
            </div>

            <div class="form-container">
                <div class="card">
                    <div class="event-info-summary" id="eventSummary"></div>

                    <form id="registrationForm" onsubmit="handleSubmit(event)">
                        <div class="form-group">
                            <label for="siCardNumber">Číslo SI karty *</label>
                            <input type="text" id="siCardNumber" name="siCardNumber" class="form-input"
                                   placeholder="např. 123456" maxlength="8" pattern="[0-9]{4,8}" required>
                            <small style="color: var(--gray-500); margin-top: 0.25rem; display: block;">
                                Zadejte číslo vaší SportIdent karty (4-8 číslic)
                            </small>
                            <span class="error-message" id="siCardNumber-error"></span>
                        </div>

                        <div class="form-actions">
                            <a id="backLink" class="btn btn-secondary">Zrušit</a>
                            <button type="submit" class="btn btn-primary">Zaregistrovat se</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="errorState" style="display: none; text-align: center; padding: 3rem;">
            <svg width="64" height="64" viewBox="0 0 20 20" fill="#DC2626" style="margin-bottom: 1rem;">
                <path fill-rule="evenodd"
                      d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"/>
            </svg>
            <h3 style="color: var(--gray-900);">Akce nebyla nalezena</h3>
            <p style="color: var(--gray-500);">Požadovaná akce neexistuje nebo nemáte přístup.</p>
            <a href="list.html" class="btn btn-primary" style="margin-top: 1rem;">Zpět na seznam akcí</a>
        </div>
    </main>
</div>

<script src="../api-client.js"></script>
<script src="../app.js"></script>
<script>
    let eventData = null;
    const eventId = new URLSearchParams(window.location.search).get('id');

    document.addEventListener('DOMContentLoaded', async () => {
        checkAuth();
        if (eventId) {
            await loadEvent();
        } else {
            showErrorState();
        }
    });

    async function loadEvent() {
        try {
            const response = await apiClient.getEvent(eventId);
            eventData = response;

            if (eventData.status !== 'ACTIVE') {
                alert('Na tuto akci se nelze registrovat. Akce není aktivní.');
                window.location.href = 'list.html';
                return;
            }

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('formContent').style.display = 'block';

            document.getElementById('eventSubtitle').textContent = 'Registrace na akci: ' + eventData.name;
            document.getElementById('backLink').href = 'detail.html?id=' + eventId;

            const summary = document.getElementById('eventSummary');
            summary.innerHTML = '';

            const createSummaryItem = (label, value) => {
                const item = document.createElement('div');
                item.className = 'summary-item';

                const labelSpan = document.createElement('span');
                labelSpan.className = 'summary-label';
                labelSpan.textContent = label;

                const valueSpan = document.createElement('span');
                valueSpan.className = 'summary-value';
                valueSpan.textContent = value;

                item.appendChild(labelSpan);
                item.appendChild(valueSpan);
                return item;
            };

            summary.appendChild(createSummaryItem('Akce:', eventData.name));
            summary.appendChild(createSummaryItem('Datum:', formatDate(eventData.eventDate)));
            summary.appendChild(createSummaryItem('Místo:', eventData.location));
        } catch (error) {
            showErrorState();
        }
    }

    async function handleSubmit(e) {
        e.preventDefault();

        document.getElementById('siCardNumber-error').textContent = '';

        const siCardNumber = document.getElementById('siCardNumber').value.trim();

        if (!siCardNumber) {
            document.getElementById('siCardNumber-error').textContent = 'Číslo SI karty je povinné';
            return;
        }

        if (!/^\\d{4,8}$/.test(siCardNumber)) {
            document.getElementById('siCardNumber-error').textContent = 'Číslo SI karty musí mít 4-8 číslic';
            return;
        }

        try {
            await apiClient.registerForEvent(eventId, {siCardNumber});
            showToast('Registrace byla úspěšná', 'success');
            setTimeout(() => {
                window.location.href = 'detail.html?id=' + eventId;
            }, 1000);
        } catch (error) {
            if (error.data && error.data.detail) {
                document.getElementById('siCardNumber-error').textContent = error.data.detail;
            } else {
                handleApiError(error);
            }
        }
    }

    function showErrorState() {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('formContent').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
    }

    function handleLogout() {
        if (confirm('Opravdu se chcete odhlásit?')) {
            sessionStorage.removeItem('isAuthenticated');
            apiClient.clearToken();
            window.location.href = '../auth/login.html';
        }
    }
</script>
<style>
    @keyframes spin {
        from {
            transform: rotate(0deg);
        }
        to {
            transform: rotate(360deg);
        }
    }

    .form-container {
        max-width: 500px;
    }

    .event-info-summary {
        background-color: var(--gray-50);
        border-radius: 0.5rem;
        padding: 1rem;
        margin-bottom: 1.5rem;
    }

    .summary-item {
        display: flex;
        justify-content: space-between;
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--gray-200);
    }

    .summary-item:last-child {
        border-bottom: none;
    }

    .summary-label {
        font-weight: 500;
        color: var(--gray-600);
    }

    .summary-value {
        color: var(--gray-900);
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-weight: 500;
        color: var(--gray-700);
        margin-bottom: 0.5rem;
    }

    .form-group input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--gray-300);
        border-radius: 0.375rem;
        font-size: 1rem;
        font-family: inherit;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .error-message {
        display: block;
        color: #DC2626;
        font-size: 0.875rem;
        margin-top: 0.25rem;
        min-height: 1.25rem;
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
    }

    .form-actions a,
    .form-actions button {
        flex: 1;
    }
</style>
</body>
</html>
