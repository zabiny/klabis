            <a href="../index.html" class="nav-item">

                </svg>

            </a>
            <a href="form.html" class="nav-item">

                <span>Nová akce</span>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">A</div>
                <div class="user-details">
                    <span class="user-name">Administrátor</span>
                    <span class="user-reg-number">admin</span>
                </div>
            </div>
            <button onclick="handleLogout()" class="btn-logout">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path fill-rule="evenodd"

    <main class="main-content">
        <div class="content-header">
            <h2>Správa akcí</h2>
            <p>Procházejte a spravujte plánované akce klubu</p>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h3 class="table-title">Seznam akcí</h3>
                <div class="table-actions">
                    <div class="filters-section">
                        <div class="filter-group">
                            <label for="statusFilter">Status:</label>
                            <select id="statusFilter" class="form-input" onchange="handleFilterChange()">
                                <option value="">Všechny statusy</option>
                                <option value="DRAFT">Návrh</option>
                                <option value="ACTIVE">Aktivní</option>
                                <option value="FINISHED">Dokončené</option>
                                <option value="CANCELLED">Zrušené</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="organizerFilter">Pořadatel:</label>
                            <select id="organizerFilter" class="form-input" onchange="handleFilterChange()">
                                <option value="">Všichni pořadatelé</option>
                                <option value="OOB">OOB</option>
                                <option value="PRG">PRG</option>
                                <option value="BRN">BRN</option>
                                <option value="OLA">OLA</option>
                                <option value="OST">OST</option>
                            </select>
                        </div>
                    </div>
                    <a href="form.html" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"/>
                        </svg>
                        Nová akce
                    </a>
                </div>
            </div>

            <table>
                <thead>
                <tr>
                    <th>Název</th>
                    <th>Datum</th>
                    <th>Místo</th>
                    <th>Pořadatel</th>
                    <th>Status</th>
                    <th>Registrace</th>
                    <th>Akce</th>
                </tr>
                </thead>
                <tbody id="eventsTableBody"></tbody>
            </table>

            <div class="pagination">
                <div class="pagination-info" id="paginationInfo"></div>
                <div class="pagination-nav" id="paginationNav"></div>
            </div>
        </div>
    </main>
</div>

<script src="../api-client.js"></script>
<script src="../app.js"></script>
<script>
    let eventsData = null;
    let currentPage = 0;
    const pageSize = 10;
    let selectedStatus = '';
    let selectedOrganizer = '';

    document.addEventListener('DOMContentLoaded', async () => {
        checkAuth();
        await loadEvents();
    });

    async function loadEvents() {
        showLoading();

        try {
            const params = {
                page: currentPage,
                size: pageSize
            };

            if (selectedStatus) params.status = selectedStatus;
            if (selectedOrganizer) params.organizer = selectedOrganizer;

            const response = await apiClient.getEvents(params);
            eventsData = response;
            renderEvents();
            renderPagination();
        } catch (error) {
            handleApiError(error);
        }
    }

    function showLoading() {
        const tbody = document.getElementById('eventsTableBody');
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 7;
        td.style.textAlign = 'center';
        td.style.padding = '2rem';
        const spinner = document.createElement('div');
        spinner.style.cssText = 'display: inline-block; width: 30px; height: 30px; border: 3px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;';
        const p = document.createElement('p');
        p.style.cssText = 'margin-top: 1rem; color: var(--gray-500);';
        p.textContent = 'Načítání akcí...';
        td.appendChild(spinner);
        td.appendChild(p);
        tr.appendChild(td);
        tbody.innerHTML = '';
        tbody.appendChild(tr);
    }

    function renderEvents() {
        if (!eventsData || !eventsData._embedded) {
            const tbody = document.getElementById('eventsTableBody');
            const tr = document.createElement('tr');
            const td = document.createElement('td');
            td.colSpan = 7;
            td.style.textAlign = 'center';
            td.style.padding = '2rem';
            const p = document.createElement('p');
            p.style.color = 'var(--gray-500)';
            p.textContent = 'Žádné akce nebyly nalezeny.';
            td.appendChild(p);
            tr.appendChild(td);
            tbody.innerHTML = '';
            tbody.appendChild(tr);
            updatePaginationInfo(0, 0, 0);
            return;
        }

        const tbody = document.getElementById('eventsTableBody');
        tbody.innerHTML = '';
        const events = eventsData._embedded.eventSummaryDtoList || [];

        events.forEach(event => {
            const tr = document.createElement('tr');

            const nameCell = document.createElement('td');
            const nameStrong = document.createElement('strong');
            nameStrong.textContent = event.name;
            nameCell.appendChild(nameStrong);

            const dateCell = document.createElement('td');
            dateCell.textContent = formatDate(event.eventDate);

            const locationCell = document.createElement('td');
            locationCell.textContent = event.location;

            const organizerCell = document.createElement('td');
            const organizerSpan = document.createElement('span');
            organizerSpan.className = 'badge badge-info';
            organizerSpan.textContent = event.organizer;
            organizerCell.appendChild(organizerSpan);

            const statusCell = document.createElement('td');
            const statusSpan = document.createElement('span');
            statusSpan.className = `status-badge status-${event.status.toLowerCase()}`;
            statusSpan.textContent = getStatusText(event.status);
            statusCell.appendChild(statusSpan);

            const registrationCell = document.createElement('td');
            const registrationSpan = document.createElement('span');
            registrationSpan.style.color = 'var(--gray-600)';
            registrationSpan.textContent = event.registrationCount || 0;
            registrationCell.appendChild(registrationSpan);

            const actionCell = document.createElement('td');
            const link = document.createElement('a');
            link.href = `detail.html?id=${event.id}`;
            link.className = 'btn-link';
            link.textContent = 'Zobrazit';
            actionCell.appendChild(link);

            tr.appendChild(nameCell);
            tr.appendChild(dateCell);
            tr.appendChild(locationCell);
            tr.appendChild(organizerCell);
            tr.appendChild(statusCell);
            tr.appendChild(registrationCell);
            tr.appendChild(actionCell);
            tbody.appendChild(tr);
        });

        const page = eventsData.page || {};
        updatePaginationInfo(
            page.number || 0,
            page.totalPages || 0,
            page.totalElements || 0
        );
    }

    function renderPagination() {
        if (!eventsData) return;

        const nav = document.getElementById('paginationNav');
        const page = eventsData.page || {totalPages: 1, number: 0};
        const totalPages = page.totalPages || 1;

        nav.innerHTML = '';

        const prevBtn = document.createElement('button');
        prevBtn.className = 'pagination-btn';
        if (currentPage === 0) prevBtn.disabled = true;
        prevBtn.textContent = '← Předchozí';
        prevBtn.onclick = () => goToPage(currentPage - 1);
        nav.appendChild(prevBtn);

        for (let i = 0; i < totalPages; i++) {
            if (i === 0 || i === totalPages - 1 || (i >= currentPage - 1 && i <= currentPage + 1)) {
                const btn = document.createElement('button');
                btn.className = 'pagination-btn';
                if (i === currentPage) btn.classList.add('active');
                btn.textContent = String(i + 1);
                btn.onclick = () => goToPage(i);
                nav.appendChild(btn);
            } else if (i === currentPage - 2 || i === currentPage + 2) {
                const span = document.createElement('span');
                span.style.padding = '0.375rem 0.5rem';
                span.style.color = 'var(--gray-400)';
                span.textContent = '...';
                nav.appendChild(span);
            }
        }

        const nextBtn = document.createElement('button');
        nextBtn.className = 'pagination-btn';
        if (currentPage >= totalPages - 1) nextBtn.disabled = true;
        nextBtn.textContent = 'Další →';
        nextBtn.onclick = () => goToPage(currentPage + 1);
        nav.appendChild(nextBtn);
    }

    function goToPage(page) {
        if (!eventsData) return;
        const totalPages = eventsData.page?.totalPages || 1;
        if (page < 0 || page >= totalPages) return;
        currentPage = page;
        loadEvents();
    }

    function updatePaginationInfo(currentPageNum, totalPages, totalElements) {
        const info = document.getElementById('paginationInfo');
        if (totalElements === 0) {
            info.textContent = 'Žádné akce';
            return;
        }
        const start = currentPageNum * pageSize + 1;
        const end = Math.min((currentPageNum + 1) * pageSize, totalElements);
        info.textContent = `Zobrazeno ${start}-${end} z ${totalElements} akcí`;
    }

    function handleFilterChange() {
        selectedStatus = document.getElementById('statusFilter').value;
        selectedOrganizer = document.getElementById('organizerFilter').value;
        currentPage = 0;
        loadEvents();
    }

    function getStatusText(status) {
        const texts = {
            'DRAFT': 'Návrh',
            'ACTIVE': 'Aktivní',
            'FINISHED': 'Dokončeno',
            'CANCELLED': 'Zrušeno'
        };
        return texts[status] || status;
    }

    function handleLogout() {
        if (confirm('Opravdu se chcete odhlásit?')) {
            sessionStorage.removeItem('isAuthenticated');
            apiClient.clearToken();
            window.location.href = '../auth/login.html';
        }
    }
</script>
<style>
    @keyframes spin {
        from {
            transform: rotate(0deg);
        }
        to {
            transform: rotate(360deg);
        }
    }

    .filters-section {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
    }

    .filter-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .filter-group label {
        font-weight: 500;
        color: var(--gray-700);
        white-space: nowrap;
    }

    .filter-group select {
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--gray-300);
        border-radius: 0.375rem;
        font-size: 0.875rem;
    }

    .badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 0.375rem;
        font-size: 0.75rem;
        font-weight: 600;
        white-space: nowrap;
    }

    .badge-info {
        background-color: #E0E7FF;
        color: #3730A3;
    }

    .status-draft {
        background-color: #F3F4F6;
        color: #374151;
    }

    .status-active {
        background-color: #D1FAE5;
        color: #065F46;
    }

    .status-finished {
        background-color: #DBEAFE;
        color: #0C4A6E;
    }

    .status-cancelled {
        background-color: #FEE2E2;
        color: #7F1D1D;
    }
</style>
</body>
