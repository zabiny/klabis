    <main class="main-content">
        <div class="content-header">
            <h2>Nová akce</h2>
            <p>Vytvořit novou plánovanou akci</p>
        </div>

        <div class="form-container">
            <div class="card">
                <form id="eventForm" onsubmit="handleSubmit(event)">
                    <div class="form-section">
                        <h3>Základní informace</h3>

                        <div class="form-group">
                            <label for="name">Název akce *</label>
                            <input type="text" id="name" name="name" class="form-input"
                                   placeholder="např. Spring Cup 2026" maxlength="200" required>
                            <span class="error-message" id="name-error"></span>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="eventDate">Datum akce *</label>
                                <input type="date" id="eventDate" name="eventDate" class="form-input" required>
                                <span class="error-message" id="eventDate-error"></span>
                            </div>

                            <div class="form-group">
                                <label for="location">Místo konání *</label>
                                <input type="text" id="location" name="location" class="form-input"
                                       placeholder="např. Lesy u Slaného" maxlength="200" required>
                                <span class="error-message" id="location-error"></span>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="organizer">Pořadatel *</label>
                                <select id="organizer" name="organizer" class="form-input" required>
                                    <option value="">Vyberte pořadatele...</option>
                                    <option value="OOB">OOB - Občanský orientační běh</option>
                                    <option value="PRG">PRG - Praha</option>
                                    <option value="BRN">BRN - Brno</option>
                                    <option value="OLA">OLA - Olomouc</option>
                                    <option value="OST">OST - Ostrava</option>
                                </select>
                                <span class="error-message" id="organizer-error"></span>
                            </div>

                            <div class="form-group">
                                <label for="websiteUrl">Web (URL)</label>
                                <input type="url" id="websiteUrl" name="websiteUrl" class="form-input"
                                       placeholder="https://example.com" maxlength="2000">
                                <span class="error-message" id="websiteUrl-error"></span>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Volitelné informace</h3>

                        <div class="form-group">
                            <label for="eventCoordinatorId">Koordinátor akce</label>
                            <input type="text" id="eventCoordinatorId" name="eventCoordinatorId" class="form-input"
                                   placeholder="Jméno nebo ID koordinátora" disabled>
                            <small style="color: var(--gray-500); margin-top: 0.25rem; display: block;">
                                Funkce zatím není dostupná. Bude přidána v další verzi.
                            </small>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="list.html" class="btn btn-secondary">Zrušit</a>
                        <button type="submit" class="btn btn-primary">Vytvořit akci</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>

<script src="../api-client.js"></script>
<script src="../app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        checkAuth();
    });

    async function handleSubmit(e) {
        e.preventDefault();

        // Clear previous errors
        document.querySelectorAll('.error-message').forEach(el => el.textContent = '');

        const formData = {
            name: document.getElementById('name').value.trim(),
            eventDate: document.getElementById('eventDate').value,
            location: document.getElementById('location').value.trim(),
            organizer: document.getElementById('organizer').value,
            websiteUrl: document.getElementById('websiteUrl').value.trim() || null
        };

        // Basic client-side validation
        if (!formData.name) {
            showError('name-error', 'Název akce je povinný');
            return;
        }

        if (formData.name.length > 200) {
            showError('name-error', 'Název nesmí přesáhnout 200 znaků');
            return;
        }

        if (!formData.eventDate) {
            showError('eventDate-error', 'Datum akce je povinné');
            return;
        }

        if (!formData.location) {
            showError('location-error', 'Místo konání je povinné');
            return;
        }

        if (formData.location.length > 200) {
            showError('location-error', 'Místo nesmí přesáhnout 200 znaků');
            return;
        }

        if (!formData.organizer) {
            showError('organizer-error', 'Pořadatel je povinný');
            return;
        }

        if (formData.websiteUrl && !isValidUrl(formData.websiteUrl)) {
            showError('websiteUrl-error', 'Zadejte platnou URL (http:// nebo https://)');
            return;
        }

        try {
            const response = await apiClient.createEvent(formData);
            showToast('Akce byla úspěšně vytvořena', 'success');
            setTimeout(() => {
                window.location.href = `detail.html?id=${response.id}`;
            }, 1000);
        } catch (error) {
            if (error.data && error.data.detail) {
                showToast(error.data.detail, 'error');
            } else {
                handleApiError(error);
            }
        }
    }

    function showError(elementId, message) {
        const el = document.getElementById(elementId);
        if (el) el.textContent = message;
    }

    function isValidUrl(string) {
        try {
            const url = new URL(string);
            return url.protocol === 'http:' || url.protocol === 'https:';
        } catch (_) {
            return false;
        }
    }

    function handleLogout() {
        if (confirm('Opravdu se chcete odhlásit?')) {
            sessionStorage.removeItem('isAuthenticated');
            apiClient.clearToken();
            window.location.href = '../auth/login.html';
        }
    }
</script>
<style>
    .form-container {
        max-width: 600px;
    }

    .form-section {
        margin-bottom: 2rem;
    }

    .form-section h3 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--gray-900);
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--gray-200);
    }

    .form-group {
        margin-bottom: 1rem;
    }

    .form-group label {
        display: block;
        font-weight: 500;
        color: var(--gray-700);
        margin-bottom: 0.5rem;
    }

    .form-group input,
    .form-group select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--gray-300);
        border-radius: 0.375rem;
        font-size: 1rem;
        font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .form-group input:disabled,
    .form-group select:disabled {
        background-color: var(--gray-100);

        cursor: not-allowed;
    }

    .error-message {
        display: block;

        font-size: 0.875rem;

        min-height: 1.25rem;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    @media (max-width: 640px) {
        .form-row {
            grid-template-columns: 1fr;
        }
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid var(--gray-200);
    }

    .form-actions a,
    .form-actions button {

    }
</style>
