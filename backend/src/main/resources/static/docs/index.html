<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumentace Klabis</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
        }
        .card {
            text-align: center;
            padding: 3.5rem 3rem;
            max-width: 560px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
        }
        .icon {
            font-size: 4.5rem;
            margin-bottom: 0.5rem;
            line-height: 1;
        }
        h1 {
            font-size: 2.25rem;
            margin: 0.75rem 0 1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin: 0;
            line-height: 1.5;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            opacity: 0.65;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📚</div>
        <h1>Tady někdy bude dokumentace</h1>
        <p>Klabis developer dokumentace se připravuje. Vrať se za chvíli.</p>
        <div class="footer">Klabis · Developer Docs</div>
    </div>
</body>
</html>
